<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Host | Barfly Blackout Bingo</title><link rel="stylesheet" href="/styles.css"></head><body><div class="wrap"><header class="panel hot"><div class="row" style="justify-content:space-between"><div><div class="brand" style="font-size:42px"><span>BARFLY BLACKOUT BINGO</span></div><p class="tag">Host Dashboard • 7-second caller • Powers enabled</p></div><a class="btn secondary" href="/">Title</a></div></header><main class="grid2" style="margin-top:14px"><section class="panel"><h2>Create / Load Session</h2><label>Session Name</label><input id="title" value="Barfly Blackout Bingo"><div style="height:10px"></div><button class="btn" id="createBtn">Create Session</button><div style="height:16px"></div><label>Or enter existing code</label><div class="row"><input id="loadCode" placeholder="12345" maxlength="5"><button class="btn secondary" id="loadBtn">Load</button></div></section><section class="panel"><h2>Session</h2><div id="sessionBox" class="tiny">Create a session to get a QR code.</div></section></main><main id="dash" style="display:none"><section class="panel hot" style="margin-top:14px"><div class="grid3"><div><div class="tiny">Current Call</div><div id="call" class="call">WAIT</div></div><div><div class="tiny">Timer</div><h1 id="secs">--</h1><div class="timerbar"><div id="bar"></div></div></div><div><div class="tiny">Controls</div><div class="row"><button class="btn green" id="startBtn">Start</button><button class="btn secondary" id="pauseBtn">Pause</button><button class="btn ice" id="nextBtn">Next Now</button><button class="btn secondary" id="approveAllBtn">Approve All Cards</button></div></div></div></section><div class="grid2" style="margin-top:14px"><section class="panel"><h2>Top 5 Leaderboard</h2><div id="leader"></div></section><section class="panel"><h2>Winners</h2><div id="winners" class="log"></div></section></div><section class="panel" style="margin-top:14px"><h2>Players / Purchases</h2><div style="overflow:auto"><table class="table"><thead><tr><th>Name</th><th>Cards</th><th>Status</th><th>Best Card</th><th>Powers</th><th>Action</th></tr></thead><tbody id="players"></tbody></table></div></section><section class="panel" style="margin-top:14px"><h2>Power Log</h2><div id="log" class="log"></div></section></main></div><div id="toast" class="toast"></div><script src="/socket.io/socket.io.js"></script><script src="/app.js"></script><script>
let code=getStored('bbb_host_code')||'', state=null; if(code) $('#loadCode').value=code;
$('#createBtn').onclick=()=>socket.emit('createSession',{title:$('#title').value,origin:location.origin},res=>{if(!res.ok)return toast(res.error); code=res.state.session.code; setStored('bbb_host_code',code); show(res.state);});
$('#loadBtn').onclick=()=>{code=$('#loadCode').value.trim(); socket.emit('joinHost',{code},res=>{if(!res.ok)return toast(res.error); setStored('bbb_host_code',code); show(res.state);});};
if(code){socket.emit('joinHost',{code},res=>{if(res.ok)show(res.state);});}
socket.on('hostState', s=>show(s));
function show(s){state=s; $('#dash').style.display='block'; const ses=s.session; $('#sessionBox').innerHTML=`<div class="row"><div><div class="tiny">Session Code</div><h1 class="code">${ses.code}</h1><p class="tiny">Player link: <b>${location.origin}/player.html?code=${ses.code}</b></p></div>${ses.qrDataUrl?`<img class="qr" src="${ses.qrDataUrl}">`:''}</div>`; render();}
$('#startBtn').onclick=()=>socket.emit('startGame',{code:state.session.code}); $('#pauseBtn').onclick=()=>socket.emit('pauseGame',{code:state.session.code}); $('#nextBtn').onclick=()=>socket.emit('nextCall',{code:state.session.code}); $('#approveAllBtn').onclick=()=>socket.emit('approveAll',{code:state.session.code});
function render(){if(!state)return; const s=state.session; $('#call').textContent=s.currentCall?s.currentCall.code:'WAIT'; $('#secs').textContent=s.status==='running'?secondsLeft(s.callEndsAt)+'s':s.status.toUpperCase(); $('#bar').style.width=pctLeft(s.callEndsAt)+'%'; $('#leader').innerHTML=renderLeaderboard(s.leaderboard); $('#winners').innerHTML=(s.winners||[]).map(w=>`<div><b>${escapeHtml(w.name)}</b> won on ${cardShort(w.cardId)}</div>`).join('')||'<div class="tiny">No winner yet.</div>'; $('#players').innerHTML=state.players.map(p=>`<tr><td><b>${escapeHtml(p.name)}</b></td><td>${p.cardCount}</td><td>${p.approved?'Approved':'Pending payment'}</td><td>${p.best.cardId?`${cardShort(p.best.cardId)} • ${p.best.remaining} away • ${p.best.lines} lines`:''}</td><td>F:${p.powers.freeze} S:${p.powers.shield} D:${p.powers.doubleTap}</td><td>${p.approved?'<span class="pill">Active</span>':`<button class="btn green" onclick="approve('${p.id}')">Approve</button>`}</td></tr>`).join(''); $('#log').innerHTML=(state.powerLog||[]).slice().reverse().map(x=>`<div>${escapeHtml(x)}</div>`).join('')||'<div class="tiny">No powers yet.</div>';}
function approve(id){socket.emit('approvePlayer',{code:state.session.code,playerId:id});}
setInterval(()=>{if(state)render();},300);
</script></body></html>
