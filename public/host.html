<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Host | Barfly Blackout Bingo</title><link rel="stylesheet" href="/styles.css"></head><body>
<main class="host-shell"><section class="panel compact-panel"><div class="active-bar"><div><h1 style="margin:0">Host Dashboard</h1><div class="tiny">Slim multi-session control hub</div></div><div class="button-row"><input id="joinCode" placeholder="Session code" style="max-width:150px"><button id="hostJoinBtn" class="btn secondary small">Open</button><button id="refreshBtn" class="btn secondary small">Sync Dashboard</button></div></div></section>
<section class="panel compact-panel"><details open><summary>Create Scheduled Game</summary><div class="host-create" style="margin-top:10px"><label class="field"><span>Game Title</span><input id="title" value="Barfly Blackout Bingo"></label><label class="field"><span>Date</span><input id="gameDate" type="date"></label><label class="field"><span>Time</span><input id="gameTime" type="time"></label><label class="field"><span>Cards Per Player</span><select id="cardsPerPlayer"><option value="1">1 card</option><option value="2">2 cards</option><option value="3" selected>3 cards</option></select></label><label class="field"><span>Player Cap</span><input id="playerCap" type="number" min="1" max="500" value="40"></label><label class="field"><span>Caller Timer</span><select id="callTimer"><option value="5000">5 sec</option><option value="7000" selected>7 sec</option><option value="8000">8 sec</option><option value="10000">10 sec</option><option value="12000">12 sec</option><option value="15000">15 sec</option><option value="20000">20 sec</option><option value="30000">30 sec</option></select></label><label class="field wide"><span>Tip the Host Link optional</span><input id="tipLink" placeholder="https://venmo.com/u/... or https://cash.app/$..."></label><label class="field"><span>Timezone</span><input id="tzLabel" readonly></label><label class="field"><span>Sponsor 1 Name</span><input id="sponsor1Name"></label><label class="field"><span>Sponsor 1 Message</span><input id="sponsor1Message"></label><label class="field wide"><span>Sponsor 1 Logo URL</span><input id="sponsor1Logo"></label><label class="field"><span>Sponsor 2 Name</span><input id="sponsor2Name"></label><label class="field"><span>Sponsor 2 Message</span><input id="sponsor2Message"></label><label class="field wide"><span>Sponsor 2 Logo URL</span><input id="sponsor2Logo"></label><label class="field"><span>Sponsor 3 Name</span><input id="sponsor3Name"></label><label class="field"><span>Sponsor 3 Message</span><input id="sponsor3Message"></label><label class="field wide"><span>Sponsor 3 Logo URL</span><input id="sponsor3Logo"></label><div><button id="createBtn" class="btn">Create Game</button></div></div></details></section>
<section class="panel compact-panel"><h2 style="margin-top:0">All Sessions</h2><div id="sessionList" class="sessions-strip"></div></section>
<section id="dash" class="hidden"><section class="panel compact-panel"><div class="active-bar"><div><b id="activeTitle">Active Session</b><div id="scheduledInfo" class="tiny"></div></div><div><span id="codePill" class="pill">Code</span></div><div><div class="tiny">Current Call</div><div id="currentCall" class="current-call slim">--</div></div><label class="field" style="max-width:130px"><span>Timer</span><select id="activeTimer"><option value="5000">5 sec</option><option value="7000">7 sec</option><option value="8000">8 sec</option><option value="10000">10 sec</option><option value="12000">12 sec</option><option value="15000">15 sec</option><option value="20000">20 sec</option><option value="30000">30 sec</option></select></label><div class="button-row"><button id="copyLinkBtn" class="btn secondary small">Copy Link</button><button id="openLinkBtn" class="btn secondary small">Open Player</button><button id="showQrBtn" class="btn secondary small">Share Game</button></div></div></section>
<section class="panel compact-panel"><details open><summary>Active Game Controls</summary><div class="button-row" style="margin-top:10px"><button id="startBtn" class="btn small">Start / First Call</button><button id="callBtn" class="btn secondary small">Call Next</button><button id="autoBtn" class="btn secondary small">Auto: Off</button><button id="endBtn" class="btn danger small">End / Results Countdown</button><button id="newRoundBtn" class="btn secondary small">Clear Board / Keep Players</button><button id="clearBtn" class="btn danger small">Clear Players & Scores</button></div></details></section>
<section class="host-grid"><section class="panel compact-panel"><h2>Winners</h2><div id="winners"></div></section><section class="panel compact-panel"><h2>Leaders</h2><div id="leaderboard"></div></section><section class="panel compact-panel"><h2>Cumulative Wins</h2><div id="cumulative"></div></section><section class="panel compact-panel"><h2>RSVPs</h2><div id="reservations"></div></section><section class="panel compact-panel"><h2>Players</h2><div id="players"></div></section><section class="panel compact-panel collapsible"><details><summary>Host Log</summary><div id="hostLog" class="tiny"></div></details></section></section></section>
</main>
<div id="qrModal" class="modal"><div class="modal-card"><h1>Share Game</h1><div id="qrHolder"></div><p id="qrLink" class="tiny"></p><div class="button-row" style="margin-top:16px"><button class="btn secondary" onclick="closeQr()">Close</button><button id="copyLinkBtn2" class="btn">Copy Link</button></div></div></div><div id="toast" class="toast"></div>
<script src="/socket.io/socket.io.js"></script><script src="/app.js"></script><script>
let state=null, code=read('bbb_host_code')||'', auto=false, hostSessions=[];
if(code) $('#joinCode').value=code; const today=new Date(); $('#gameDate').value=`${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}-${String(today.getDate()).padStart(2,'0')}`; $('#gameTime').value='19:00'; $('#tzLabel').value=Intl.DateTimeFormat().resolvedOptions().timeZone||'local';
$('#createBtn').onclick=createSession; $('#hostJoinBtn').onclick=()=>hostJoin(); $('#refreshBtn').onclick=refreshSessions; $('#copyLinkBtn').onclick=()=>copyText(playerLink(),'Player link copied.'); $('#copyLinkBtn2').onclick=()=>copyText(playerLink(),'Player link copied.'); $('#openLinkBtn').onclick=()=>window.open(playerLink(),'_blank'); $('#showQrBtn').onclick=showQr; $('#startBtn').onclick=()=>emit('startGame'); $('#callBtn').onclick=()=>emit('callNext'); $('#endBtn').onclick=()=>confirm('Start results countdown?')&&emit('endGame'); $('#newRoundBtn').onclick=()=>confirm('Clear board and keep players?')&&emit('newRound'); $('#clearBtn').onclick=()=>confirm('Clear players, RSVPs, and cumulative wins?')&&emit('clearGame');
$('#autoBtn').onclick=()=>{auto=!auto; socket.emit('toggleAutoCall',{code,on:auto,ms:Number($('#activeTimer').value)||7000},res=>{ if(!res.ok){auto=!auto;toast(res.error)} render(); });}; $('#activeTimer').onchange=()=>{ if(!code)return; socket.emit('setCallTimer',{code,ms:Number($('#activeTimer').value)},res=>{ if(!res.ok)toast(res.error); else toast('Caller timer updated.'); }); };
socket.on('hostState', s=>{ state=s; code=s.session.code; store('bbb_host_code',code); if(s.session.callIntervalMs) $('#activeTimer').value=String(s.session.callIntervalMs); render(); refreshSessions(); }); socket.on('hostSessions', list=>{hostSessions=list||[]; renderSessionList();}); socket.on('publicSessions', list=>{hostSessions=list||[]; renderSessionList();}); socket.emit('hostListSessions',{},res=>{ if(res.ok){hostSessions=res.sessions||[]; renderSessionList(); }});
setInterval(()=>{renderSessionList(); if(state) renderScheduledInfo();},800);
function sponsorPayload(){return [1,2,3].map(i=>({name:$(`#sponsor${i}Name`).value.trim(),message:$(`#sponsor${i}Message`).value.trim(),logo:$(`#sponsor${i}Logo`).value.trim()}));}
function createSession(){const localMs=new Date(`${$('#gameDate').value}T${$('#gameTime').value}:00`).getTime(); socket.emit('createSession',{title:$('#title').value.trim(),cardsPerPlayer:$('#cardsPerPlayer').value,cap:$('#playerCap').value,tipLink:$('#tipLink').value.trim(),callIntervalMs:Number($('#callTimer').value)||7000,sponsors:sponsorPayload(),scheduledAtUtc:localMs,timezone:Intl.DateTimeFormat().resolvedOptions().timeZone||'local',origin:location.origin},res=>{ if(!res.ok)return toast(res.error); state=res.state; code=res.code; store('bbb_host_code',code); render(); refreshSessions(); });}
function hostJoin(c){const openCode=String(c||$('#joinCode').value||'').trim(); if(!openCode)return toast('Enter a session code.'); socket.emit('hostJoin',{code:openCode},res=>{ if(!res.ok)return toast(res.error); state=res.state; code=openCode; store('bbb_host_code',code); if(state.session.callIntervalMs) $('#activeTimer').value=String(state.session.callIntervalMs); render(); });}
function refreshSessions(){socket.emit('hostListSessions',{},res=>{ if(res.ok){hostSessions=res.sessions||[]; renderSessionList(); }});}
function quickEmit(event,c){socket.emit(event,{code:c},res=>{ if(res&&!res.ok)toast(res.error); else refreshSessions(); });}
function quickAuto(c,ms){socket.emit('toggleAutoCall',{code:c,on:true,ms},res=>{ if(res&&!res.ok)toast(res.error); else refreshSessions(); });}
function renderSessionList(){const box=$('#sessionList'); if(!hostSessions.length){box.innerHTML='<p class="muted">No scheduled games yet.</p>';return} box.innerHTML=hostSessions.map(s=>`<div class="session-card ${s.code===code?'active':''}"><div class="session-top"><b>${escapeHtml(s.title)}</b><span class="pill">${escapeHtml(s.status)}</span></div><div class="tiny">${escapeHtml(s.label)}</div><div class="session-call">${s.currentCall?escapeHtml(s.currentCall.code):'--'}</div><div class="tiny">${s.reserved}/${s.cap} RSVP • ${s.checkedIn} in • ${s.calledCount||0} calls • ${s.winnersCount||0} winners</div><div class="tiny">Timer: ${((s.callIntervalMs||7000)/1000).toFixed(0)}s ${s.scheduledAt&&s.status==='scheduled'?'• starts '+countdownTo(s.scheduledAt):''}${s.endResetAt?'• reset '+countdownTo(s.endResetAt):''}</div><div class="session-actions"><button class="btn secondary small" onclick="hostJoin('${s.code}')">Open</button><button class="btn secondary small" onclick="quickEmit('callNext','${s.code}')">Call</button><button class="btn secondary small" onclick="quickAuto('${s.code}',${s.callIntervalMs||7000})">Auto</button><button class="btn secondary small" onclick="showQrFor('${s.code}')">QR</button></div></div>`).join('');}
function emit(event){if(!code)return toast('Create or open a session first.'); socket.emit(event,{code},res=>{ if(res&&!res.ok)toast(res.error); });}
function playerLink(){return playerLinkFor(code)} function showQrFor(c){const url=playerLinkFor(c); $('#qrHolder').innerHTML=`<img class="qr-img" src="${qrSrc(url)}" alt="QR">`; $('#qrLink').textContent=url; $('#qrModal').style.display='grid';} function showQr(){showQrFor(code)} function closeQr(){$('#qrModal').style.display='none'}
function renderScheduledInfo(){if(!state)return; const s=state.session; $('#scheduledInfo').textContent=s.scheduledAt?`${dateLabel(s.scheduledAt)} • ${s.status}${s.status==='scheduled'?' • starts in '+countdownTo(s.scheduledAt):''}${s.endResetAt?' • reset in '+countdownTo(s.endResetAt):''}`:s.status;}
function render(){if(!state)return; $('#dash').classList.remove('hidden'); $('#activeTitle').textContent=state.session.title; $('#codePill').textContent=`Code: ${state.session.code}`; $('#currentCall').textContent=state.session.currentCall?state.session.currentCall.code:(state.session.status==='results'?'RESULTS':state.session.status==='running'?'READY':'--'); renderScheduledInfo(); $('#winners').innerHTML=renderWinners(state.session.winners); $('#leaderboard').innerHTML=renderLeaderboard(state.session.leaderboard); $('#cumulative').innerHTML=renderCumulative(state.session.cumulativeLeaderboard); $('#players').innerHTML=renderPlayers(state.players); $('#reservations').innerHTML=renderReservations(state.reservations); $('#hostLog').innerHTML=(state.hostLog||[]).slice().reverse().map(x=>`<div>${escapeHtml(x)}</div>`).join(''); $('#autoBtn').textContent=`Auto: ${auto?'On':'Off'}`; renderSessionList();}
function renderReservations(rows=[]){if(!rows.length)return '<p class="muted">No RSVPs yet.</p>'; return rows.map(r=>`<div class="player-row"><div class="leader-main"><b>${escapeHtml(r.name)}</b><div class="tiny">${escapeHtml(r.phoneMasked)} ${r.social?`• ${escapeHtml(r.social)}`:''} • ${r.checkedIn?'Checked in':'Reserved'}</div></div></div>`).join('')}
function renderPlayers(players=[]){if(!players.length)return '<p class="muted">No checked-in players yet.</p>'; return players.map(p=>`<div class="player-row"><div class="leader-main"><b>${escapeHtml(p.name)}</b><div class="tiny">${p.cardCount} cards • best ${p.best.marked}/25 • cumulative wins ${p.cumulativeWins||0}</div><div class="meter"><span style="width:${Math.round(p.best.marked/25*100)}%"></span></div></div><button class="btn secondary small" onclick="renamePlayer('${p.id}','${escapeHtml(p.name)}')">Rename</button><button class="btn danger small" onclick="kickPlayer('${p.id}')">Kick</button></div>`).join('')}
function renamePlayer(id,current){const name=prompt('New player name:',current); if(!name)return; socket.emit('renamePlayer',{code,playerId:id,name},res=>{ if(!res.ok)toast(res.error); });}
function kickPlayer(id){if(!confirm('Kick this player from the game?'))return; socket.emit('kickPlayer',{code,playerId:id},res=>{ if(!res.ok)toast(res.error); });}
</script></body></html>
