{% extends 'base.html' %}
{% block content %}
<div class="hero">
  <div class="wrap">
    <div class="card" style="max-width:760px;margin:auto;text-align:center">
      <div class="brand">Barfly Social</div>
      <h1 class="title">Battle Bingo</h1>
    </div>
  </div>
</div>
<div class="bottom-actions centered">
  <a class="btn gold" href="/rsvp">RSVP</a>
  <a class="btn ghost" href="/my-rsvp">MY RSVP</a>
  <button class="btn" onclick="navigator.share?navigator.share({title:'Battle Bingo',url:location.href}):navigator.clipboard.writeText(location.href).then(()=>alert('Link copied'))">SHARE</button>
</div>
{% endblock %}
