{% extends 'base.html' %}{% set page='host-page' %}{% block content %}
<main class="dashboard">
<header class="dash-header"><div><span class="brand-kicker">BARFLY SOCIAL BINGO</span><h1>Host Dashboard</h1></div><a href="/tv" target="_blank" class="button-link">Open TV Board</a></header>
<section class="grid">
  <div class="panel"><h2>Session Settings</h2><label>Venue<input id="venue"></label><label>Blackouts to Win<select id="blackout_goal"><option>1</option><option>2</option><option selected>3</option></select></label><label>Stop After First ___ Triple Blackout Winners<input id="triple_winners_goal" type="number" value="1" min="1" max="10"></label><label>Countdown<select id="countdownSelect"><option>5</option><option selected>10</option><option>15</option><option>20</option><option>30</option></select></label><label>Mark Mode<select id="mark_mode"><option value="manual">Manual Mark</option><option value="auto">Auto Mark</option></select></label><button onclick="saveSettings()">Save Settings</button><p id="settingsMsg" class="notice"></p></div>
  <div class="panel"><h2>Gameplay</h2><div class="big-number" id="hostCurrent">--</div><button onclick="startGame()">Start Game / Lock Rules</button><button onclick="callNext()">Call Next Number</button><button class="danger" onclick="resetEverything()">Reset Everything</button></div>
  <div class="panel"><h2>Players / Moderation</h2><div id="hostPlayers"></div></div>
  <div class="panel"><h2>Leaderboard</h2><div id="hostLeaderboard"></div></div>
  <div class="panel wide"><h2>Battle Feed</h2><div id="hostFeed"></div></div>
</section>
</main>
{% endblock %}
