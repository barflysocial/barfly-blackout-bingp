{% extends 'base.html' %}{% block body %}<div class='wrap'><div class='topbar'><h1>Host Dashboard</h1><a class='btn alt' href='/'>Home</a></div><div class='grid two'><div class='card'><h2>Create Game</h2><form method='post'><label>Game Title</label><input name='title' value='Battle Bingo'><label>Venue</label><input name='venue' placeholder='Urban Daiquiris'><label>Date / Time</label><input name='starts_at' placeholder='Tonight 7:00 PM'><label>Title Graphic Card URL</label><input name='title_image' placeholder='https://...'><label>Countdown Speed</label><select name='countdown'><option>5</option><option selected>10</option><option>15</option><option>20</option><option>30</option></select><label>Mark Mode</label><select name='mark_mode'><option value='manual'>Manual Mark</option><option value='auto'>Auto Mark</option></select><label>Blackouts to Win</label><select name='blackouts_to_win'><option>1</option><option>2</option><option selected>3</option></select><label>Stop After First ___ Triple Blackout Winners</label><input name='triple_winners_needed' type='number' min='1' max='10' value='1'><button>Create Joinable Game</button></form></div><div class='card'><h2>Games</h2>{% for g in games %}<p><b>{{g.title}}</b><br><span class='small'>{{g.venue}} • {{g.status}} • Code {{g.code}}</span><br><a href='/host/{{g.code}}'>Manage</a> · <a href='/game/{{g.code}}'>Player Link</a> · <a href='/tv/{{g.code}}'>TV</a></p>{% else %}<p class='small'>No games yet.</p>{% endfor %}</div></div></div>{% endblock %}
