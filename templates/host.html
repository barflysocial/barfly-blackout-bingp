{% extends 'base.html' %}{% block content %}<div class="wrap"><div class="topbar"><div><div class="brand">Host</div><h1>Create Game</h1></div><a class="btn ghost" href="/">Home</a></div><div class="grid grid2"><form class="card form" method="post"><label>Game Title</label><input name="title" value="Battle Bingo"><label>Venue</label><input name="venue" value="Barfly Social"><label>Date / Time</label><input name="starts_at" placeholder="Tonight 7 PM"><label>Title Graphic URL</label><input name="title_image" placeholder="https://...jpg"><label>Venue Logo URL</label><input name="venue_logo" placeholder="https://...png"><label>Sponsor Banner Text</label><input name="sponsor_text" placeholder="Sponsored by..."><div class="grid grid2"><div><label>Countdown</label><select name="countdown"><option>5</option><option selected>10</option><option>15</option><option>20</option><option>30</option></select></div><div><label>Full Clear Winners Needed</label><input name="triple_winners_needed" type="number" min="1" max="10" value="1"></div><div><label>Mark Mode</label><select name="mark_mode"><option value="manual">Manual Mark</option><option value="auto">Auto Mark</option></select></div><div><label>Call Mode</label><select name="call_mode"><option value="manual">Host Call</option><option value="auto">Auto Call</option></select></div></div><input type="hidden" name="blackouts_to_win" value="1"><label><input type="checkbox" name="tv_enabled" checked> Enable TV Board</label><label><input type="checkbox" name="powers_enabled" checked> Enable Powers</label><button class="gold">Create Joinable Game</button></form><div class="card"><h2>Existing Games</h2>{% for g in games %}<p><a class="btn ghost" href="/host/{{g.code}}">{{g.title}} @ {{g.venue}}</a> <span class="pill status-{{g.status}}">{{g.status}}</span></p>{% else %}<p class="small">No games yet.</p>{% endfor %}</div></div></div>{% endblock %}
