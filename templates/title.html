{% extends 'base.html' %}{% block body %}<div class='hero'><div class='card title'>{% if g.title_image %}<img src='{{g.title_image}}' style='max-width:100%;border-radius:22px;margin-bottom:16px'>{% endif %}<div class='brand'>BARFLY SOCIAL BINGO</div><div class='h1'>{{ 'NOW PLAYING' if g.status in ['rsvp','started','paused'] else 'COMING SOON' }}</div><p class='sub'><b>{{g.title}}</b><br>{{g.venue}}{% if g.starts_at %} • {{g.starts_at}}{% endif %}</p><div class='btns'><a class='btn gold' href='/game/{{g.code}}/rsvp'>RSVP</a><a class='btn alt' href='/my-rsvp'>MY RSVP</a><button class='btn alt' onclick='shareGame()'>SHARE</button></div><div class='btns'><button class='btn alt' onclick='alert(`HOW TO PLAY\n\nComplete horizontal rows to earn Bingo credits. Every 4 rows on a card earns a random power. Mark called numbers, complete blackouts, and climb the leaderboard.`)'>❓ How To Play</button><button class='btn alt' onclick='alert(`POWERS\n\nLucky Spot: free mark.\nNumber Peek: see next number.\nSecond Chance: block attack.\nFreeze: opponent misses next call.\nRow Block: blocks a row.\nCard Shuffle: shuffle uncalled numbers.\nShield Breaker: removes defense.\nMirror Attack: reflects attack.\nPower Swap: swap powers.`)'>⚡ Power Guide</button></div></div></div><script>function shareGame(){const data={title:'{{g.title}}',text:'RSVP for {{g.title}} at {{g.venue}}',url:location.href}; if(navigator.share) navigator.share(data); else {navigator.clipboard.writeText(location.href); alert('Link copied');}}</script>{% endblock %}
