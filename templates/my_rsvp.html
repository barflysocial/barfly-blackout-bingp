{% extends 'base.html' %}{% block content %}<div class="wrap"><div class="card form" style="max-width:720px;margin:auto"><div class="brand">My RSVP</div><h1>Find Your Game</h1><form method="post"><label>Mobile Number</label><input name="phone" inputmode="tel" required><button>Search</button></form>{% for p in players %}<p><a class="btn ghost" href="/play/{{p.game.code}}/{{p.id}}">Resume {{p.game.title}} @ {{p.game.venue}} as {{p.alias}}</a> <span class="pill">{{p.game.status}}</span></p>{% endfor %}</div></div>{% endblock %}
