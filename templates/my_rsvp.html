{% extends 'base.html' %}{% block body %}<div class='wrap'><div class='card'><h1>My RSVP</h1><form method='post'><label>Search by Mobile Number</label><input name='phone' inputmode='tel' placeholder='2255551234'><button>Find RSVP</button></form>{% for p in players %}<p><b>{{p.alias}}</b> — {{p.game.title}} at {{p.game.venue}}<br><span class='small'>Status: {{p.game.status}}</span><br><a class='btn alt' href='/play/{{p.game.code}}/{{p.id}}'>Resume Session</a></p>{% endfor %}</div></div>{% endblock %}
