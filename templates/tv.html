{% extends 'base.html' %}{% block body %}<div class='wrap tv'><div class='topbar'><div><div class='brand'>BARFLY SOCIAL BINGO TV BOARD</div><h2 id='gameTitle'>{{g.title}} • {{g.venue}}</h2></div><span class='badge'>LIVE</span></div><div class='tvgrid'><div class='card'><h2>Current Number</h2><div class='current' id='current'>--</div><div class='timer'>Next Call: <span id='timer'>{{g.countdown}}</span></div><h3>Power Progress</h3><div id='progress'></div></div><div class='card'><h2>Leaderboard</h2><table class='table' id='lb'></table></div><div class='card'><h2>Battle Feed</h2><div class='feed' id='feed'></div></div></div><div class='sponsor'>{{g.venue}} • Battle Bingo • Powered by Barfly Social</div></div><script>
let t={{g.countdown}}; async function load(){let d=await fetch('/api/game/{{g.code}}').then(r=>r.json());document.getElementById('current').textContent=d.current_number||'--';document.getElementById('lb').innerHTML='<tr><th>#</th><th>Alias</th><th>BO</th><th>Pts</th><th>⚡</th></tr>'+d.leaderboard.slice(0,10).map((p,i)=>`<tr><td class='${i==0?'rank1':''}'>${i+1}</td><td>${p.alias}</td><td>${p.blackouts}</td><td>${p.points}</td><td>${'⚡'.repeat(p.powers)}</td></tr>`).join('');document.getElementById('progress').innerHTML=d.leaderboard.slice(0,6).map(p=>`<p>${p.alias}: ${p.progress}/4</p>`).join('');document.getElementById('feed').innerHTML=d.feed.map(f=>`<div class='feed-item'>${f.text}</div>`).join('')}
load();setInterval(load,2500);setInterval(()=>{t--; if(t<0)t={{g.countdown}}; document.getElementById('timer').textContent=t},1000)
</script>{% endblock %}
