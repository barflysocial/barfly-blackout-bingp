{% extends 'base.html' %}
{% block content %}
<div class="wrap qr-page">
  <div class="topbar">
    <div>
      <div class="brand">Session QR</div>
      <h1>{{g.title}}</h1>
      <p class="subtitle">{{g.venue}} · Code {{g.code}}</p>
    </div>
    <a class="btn ghost" href="/host/{{g.code}}">Back to Host</a>
  </div>
  <div class="card qr-card">
    <h2>Scan To Join</h2>
    <img class="qr-img" src="/qr/{{g.code}}.png" alt="QR code for {{g.title}}">
    <input readonly value="{{join_url}}" onclick="this.select()">
    <div class="host-control-row centered">
      <a class="btn gold" href="/qr/{{g.code}}.png" download="battle-bingo-{{g.code}}-qr.png">Download QR</a>
      <button onclick="window.print()">Print QR</button>
      <button onclick="navigator.clipboard.writeText('{{join_url}}')">Copy Link</button>
    </div>
  </div>
</div>
{% endblock %}
